<body class="h-full bg-background font-body-md text-on-background antialiased flex items-center justify-center p-gutter">

<!-- Top accent line -->

<div class="p-8">
<!-- Logo Section -->
<div class="flex flex-col items-center justify-center mb-stack-lg">
<div class="w-20 h-20 bg-surface-container-low rounded-lg shadow-sm flex items-center justify-center mb-stack-md border border-border-subtle overflow-hidden">
<img alt="Wahl Mirai Logo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCu0CqJTDrkZv2XVBUQvhbGoeMYwL4Srfk1YJvaUYPaP8mMujKdpbi9I7Caxod1COiTiGXGqF1iPjuyDZ8suWUg74mmUNB6REHX2ajbBMb60CCWCB1Tu88iJetyUWTL8gljB0W268s9O020EI49Q5HsvdDaMrMPAV6a8YQIimOFCO38M9Slu8nw7pjlvZz8GZuEWegKbQxLD4RqELt9Plv77nFdk5gVBXTo1P6GDhRUKMsDJC4emT4"/>
</div>
<h1 class="font-headline-md text-headline-md text-primary text-center">Wahl Mirai</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-stack-sm">Sistema de Votación Estudiantil</p>
</div>
<!-- VIEW 1: Login -->
<div class="block transition-opacity duration-300" id="view-login">
<form class="space-y-stack-md" onsubmit="handleLogin(event)">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-stack-sm" for="documento">Número de Documento</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">badge</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface-bright text-on-surface focus:ring-2 focus:ring-primary focus:border-primary font-body-md text-body-md transition-shadow" id="documento" name="documento" placeholder="Ej: 1020304050" required="" type="text"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-stack-sm" for="password">Contraseña Asignada</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">key</span>
</div>
<input class="block w-full pl-10 pr-10 py-2 border border-outline-variant rounded-lg bg-surface-bright text-on-surface focus:ring-2 focus:ring-primary focus:border-primary font-body-md text-body-md transition-shadow" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors focus:outline-none" onclick="togglePasswordVisibility('password', 'toggle-pwd-icon-1')" type="button">
<span class="material-symbols-outlined" id="toggle-pwd-icon-1">visibility_off</span>
</button>
</div>
<p class="mt-2 text-xs text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">info</span>
                            Usa la contraseña enviada a tu correo institucional.
                        </p>
</div>
<div class="pt-stack-md">
<button class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-on-primary bg-primary hover:bg-primary-container transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary" type="submit">
                            Acceder al Sistema
                            <span class="material-symbols-outlined ml-2 text-[18px]">arrow_forward</span>
</button>
</div>
</form>
</div>
<!-- VIEW 2: Change Password -->
<div class="hidden transition-opacity duration-300" id="view-change-password">
<div class="bg-surface-container-low border border-border-subtle rounded-lg p-4 mb-stack-md flex items-start gap-3">
<span class="material-symbols-outlined text-secondary mt-0.5" style="font-variation-settings: 'FILL' 1;">security</span>
<div>
<h3 class="font-label-md text-label-md text-on-surface">Cambio de Contraseña Obligatorio</h3>
<p class="font-body-md text-body-md text-on-surface-variant text-sm mt-1">Por seguridad de tu voto, debes establecer una nueva contraseña personal antes de continuar.</p>
</div>
</div>
<form class="space-y-stack-md" onsubmit="handlePasswordChange(event)">
<!-- Current Password (Auto-generated/Filled) -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-stack-sm" for="current-password">Contraseña Actual</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface-variant text-on-surface-variant opacity-70 cursor-not-allowed font-body-md text-body-md" disabled="" id="current-password" name="current-password" type="password" value="temp12345"/>
</div>
</div>
<!-- New Password -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-stack-sm" for="new-password">Nueva Contraseña</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">vpn_key</span>
</div>
<input class="block w-full pl-10 pr-10 py-2 border border-outline-variant rounded-lg bg-surface-bright text-on-surface focus:ring-2 focus:ring-primary focus:border-primary font-body-md text-body-md transition-shadow" id="new-password" name="new-password" placeholder="Mínimo 8 caracteres" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors focus:outline-none" onclick="togglePasswordVisibility('new-password', 'toggle-pwd-icon-2')" type="button">
<span class="material-symbols-outlined" id="toggle-pwd-icon-2">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm New Password -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-stack-sm" for="confirm-password">Confirmar Nueva Contraseña</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">check_circle</span>
</div>
<input class="block w-full pl-10 pr-10 py-2 border border-outline-variant rounded-lg bg-surface-bright text-on-surface focus:ring-2 focus:ring-primary focus:border-primary font-body-md text-body-md transition-shadow" id="confirm-password" name="confirm-password" placeholder="Repite tu nueva contraseña" required="" type="password"/>
</div>
</div>
<div class="pt-stack-md flex gap-stack-md">
<button class="w-1/3 flex justify-center items-center py-3 px-4 border border-outline rounded-lg font-label-md text-label-md text-on-surface bg-transparent hover:bg-surface-container-highest transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary" onclick="showLoginView()" type="button">
                            Cancelar
                        </button>
<button class="w-2/3 flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-on-primary bg-primary hover:bg-primary-container transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary" type="submit">
                            Guardar y Continuar
                            <span class="material-symbols-outlined ml-2 text-[18px]">save</span>
</button>
</div>
</form>
</div>

<!-- Scripts for interaction -->
<script>
        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.textContent = "visibility";
            } else {
                input.type = "password";
                icon.textContent = "visibility_off";
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            // Simulate API call for login, then show change password view
            const loginView = document.getElementById('view-login');
            const changePwdView = document.getElementById('view-change-password');
            
            loginView.classList.add('opacity-0');
            setTimeout(() => {
                loginView.classList.add('hidden');
                loginView.classList.remove('opacity-0');
                
                changePwdView.classList.remove('hidden');
                changePwdView.classList.add('opacity-0');
                
                // trigger reflow
                void changePwdView.offsetWidth;
                
                changePwdView.classList.remove('opacity-0');
            }, 300);
        }

        function showLoginView() {
            const loginView = document.getElementById('view-login');
            const changePwdView = document.getElementById('view-change-password');
            
            changePwdView.classList.add('opacity-0');
            setTimeout(() => {
                changePwdView.classList.add('hidden');
                changePwdView.classList.remove('opacity-0');
                
                loginView.classList.remove('hidden');
                loginView.classList.add('opacity-0');
                
                // trigger reflow
                void loginView.offsetWidth;
                
                loginView.classList.remove('opacity-0');
                
                // Clear forms
                document.getElementById('password').value = '';
                document.getElementById('new-password').value = '';
                document.getElementById('confirm-password').value = '';
            }, 300);
        }

        function handlePasswordChange(event) {
            event.preventDefault();
            const newPwd = document.getElementById('new-password').value;
            const confirmPwd = document.getElementById('confirm-password').value;

            if (newPwd !== confirmPwd) {
                alert("Las contraseñas no coinciden. Por favor, verifica.");
                return;
            }

            // Simulate successful password change and redirect to dashboard
            alert("Contraseña actualizada exitosamente. Redirigiendo al panel de votación...");
            // window.location.href = '/dashboard';
        }
    </script>
