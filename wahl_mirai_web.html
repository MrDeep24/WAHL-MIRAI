function gradeName(id){ const g = DB.grades.find(g=>g.id===id); return g ? g.name : '—'; }
function hasVoted(voterId, eventId){ return DB.participations.some(p=>p.voter_id===voterId && p.voting_event_id===eventId); }

let state = { user:null, view:'login', loginError:'', activeBallotEvent:null, modalCandidate:null, adminTab:'dashboard', electorTab:'dashboard', censusFilterStatus:'ALL', censusSearch:'', showPromotionModal:false, promotionDone:false, showCsvModal:false, showVoterModal:false, editingVoterId:null, toast:null };

function setState(patch){ Object.assign(state, patch); render(); }
function toast(msg){ state.toast = msg; render(); setTimeout(()=>{ state.toast=null; renderToastOnly(); }, 2600); }
function renderToastOnly(){ const el = document.getElementById('toast-slot'); if(el) el.innerHTML = toastHTML(); }

/* ---------------------- Iconos y utilidades UI ---------------------- */
function icon(name, extra=''){ return `<span class="material-symbols-outlined ${extra}">${name}</span>`; }

function statusBadge(status){
  const map = {
    ACTIVO:      ['bg-status-active/10','text-status-active','Activo'],
    INACTIVO:    ['bg-outline-variant/40','text-on-surface-variant','Inactivo'],
    ELIMINADO:   ['bg-status-deleted/10','text-status-deleted','Eliminado'],
    EGRESADO:    ['bg-status-graduated/20','text-status-graduated','Egresado'],
    PENDIENTE:   ['bg-status-pending/10','text-status-pending','Pendiente'],
    VOTADO:      ['bg-status-voted/10','text-status-voted','Votado'],
  };
  const [bg,txt,label] = map[status] || ['bg-outline-variant/30','text-on-surface-variant',status];
  return `<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold ${bg} ${txt}">${status==='PENDIENTE'?'<span class="w-1.5 h-1.5 rounded-full bg-status-pending"></span>':''}${label}</span>`;
}

function toastHTML(){
  if(!state.toast) return '';
  return `<div class="fixed bottom-6 right-6 z-50 bg-inverse-surface text-inverse-on-surface px-4 py-3 rounded-lg shadow-card fade-in flex items-center gap-2 text-sm font-medium">
    ${icon('check_circle')} ${state.toast}
  </div>`;
}

/* ============================== LOGIN ============================== */
function LoginView(){
  return `

            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">badge</span>

        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold" for="pass">Contraseña</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">key</span>
            <input id="pass" type="password" class="w-full pl-10 pr-4 py-3 bg-surface border border-outline-variant rounded-lg font-mono-id focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" placeholder="••••••••" required>
          </div>
        </div>

        ${state.loginError ? `<p class="text-sm text-error -mt-2">${state.loginError}</p>` : ''}

        <button type="submit" class="w-full bg-primary hover:bg-primary/90 text-on-primary font-semibold py-3 rounded-lg transition-colors flex items-center justify-center gap-2">
          Acceder al sistema ${icon('arrow_forward')}
        </button>

        <button type="button" onclick="openRecoveryNote()" class="text-sm text-primary text-center hover:underline">¿Olvidaste tu contraseña?</button>
      </form>

      <div class="mt-8 pt-6 border-t border-border-subtle">
        <p class="text-xs uppercase tracking-wide text-on-surface-variant font-semibold mb-2">Acceso rápido — modo demo</p>
        <div class="flex gap-2">
          <button onclick="demoLogin('1001234567','estudiante123')" class="flex-1 text-xs border border-outline-variant rounded-lg py-2 hover:bg-surface-container-low">Elector (clave ya activa)</button>
          <button onclick="demoLogin('1007654321','1007654321.2026')" class="flex-1 text-xs border border-outline-variant rounded-lg py-2 hover:bg-surface-container-low">Elector (primer ingreso)</button>
          <button onclick="demoLogin('admin.electoral','admin123')" class="flex-1 text-xs border border-outline-variant rounded-lg py-2 hover:bg-surface-container-low">Administrador</button>
        </div>
      </div>
    </div>
    ${recoveryNoteHTML()}
  </main>`;
}

function demoLogin(doc, pass){ document.getElementById('doc').value = doc; document.getElementById('pass').value = pass; handleLogin({preventDefault:()=>{}}); }

function handleLogin(e){
  e.preventDefault();
  const doc = document.getElementById('doc').value.trim();
  const pass = document.getElementById('pass').value;
  const voter = DB.voters.find(v=>v.document===doc);
  if(!voter || voter.password!==pass || voter.status==='ELIMINADO'){
    setState({ loginError:'Identificador o contraseña incorrectos.' });
    return false;
  }
  state.loginError = '';
  if(voter.requiere_cambio_clave){
    setState({ user:voter, view:'force-password' });
    return false;
  }
  setState({ user:voter, view: voter.role==='ADMIN' ? 'admin' : 'elector', adminTab:'dashboard', electorTab:'dashboard' });
  return false;
}

let recoveryNoteOpen = false;
function openRecoveryNote(){ recoveryNoteOpen = true; render(); }
function closeRecoveryNote(){ recoveryNoteOpen = false; render(); }
function recoveryNoteHTML(){
  if(!recoveryNoteOpen) return '';
  return `<div class="fixed inset-0 bg-inverse-surface/60 flex items-center justify-center p-6 z-40 fade-in" onclick="if(event.target===this) closeRecoveryNote()">
    <div class="bg-surface-container-lowest rounded-xl shadow-card max-w-sm w-full p-6">
      <div class="flex items-start gap-3 mb-4">
        ${icon('info','text-primary mt-0.5')}
        <p class="text-sm text-on-surface-variant">Wahl Mirai no usa correo electrónico para electores (RN-2): tu clave inicial es <code class="font-mono-id">documento.año</code>. Si la perdiste u olvidaste la que definiste después, pide al <strong>Administrador electoral</strong> que reinicie tu acceso desde el Censo Electoral.</p>
      </div>
      <button onclick="closeRecoveryNote()" class="w-full bg-primary text-on-primary rounded-lg py-2 text-sm font-semibold">Entendido</button>
    </div>
  </div>`;
}

/* ===================== CAMBIO OBLIGATORIO DE CLAVE (RF-M01-02) ===================== */
function ForcePasswordView(){
  return `
  <main class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-card border border-border-subtle p-8 fade-in">
      <div class="flex flex-col items-center mb-6">
        <div class="w-14 h-14 mb-3 rounded-xl bg-status-pending/10 flex items-center justify-center text-status-pending">${icon('lock_reset','text-2xl')}</div>
        <h1 class="text-xl font-bold text-primary text-center">Debes cambiar tu contraseña</h1>
        <p class="text-sm text-on-surface-variant text-center mt-1">Es tu primer ingreso con la clave autogenerada. Define una nueva antes de continuar.</p>
      </div>
      <form onsubmit="return handleForcePassword(event)" class="flex flex-col gap-4">
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold">Nueva contraseña</label>
          <input id="new-pass" type="password" minlength="8" required class="w-full px-4 py-3 bg-surface border border-outline-variant rounded-lg font-mono-id focus:outline-none focus:ring-2 focus:ring-primary">
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold">Confirmar contraseña</label>
          <input id="new-pass-2" type="password" minlength="8" required class="w-full px-4 py-3 bg-surface border border-outline-variant rounded-lg font-mono-id focus:outline-none focus:ring-2 focus:ring-primary">
        </div>
        <p id="force-pass-error" class="text-sm text-error hidden">La contraseña debe tener mínimo 8 caracteres, coincidir en ambos campos y no ser igual a la autogenerada.</p>
        <button class="w-full bg-secondary text-on-secondary font-semibold py-3 rounded-lg mt-2">Guardar y continuar</button>
      </form>
    </div>
  </main>`;
}
function handleForcePassword(e){
  e.preventDefault();
  const p1 = document.getElementById('new-pass').value, p2 = document.getElementById('new-pass-2').value;
  const err = document.getElementById('force-pass-error');
  if(p1.length<8 || p1!==p2 || p1===state.user.password){ err.classList.remove('hidden'); return false; }
  state.user.password = p1; state.user.requiere_cambio_clave = false;
  DB.auditLog.push({action:'PASSWORD_CHANGED', voter_id:state.user.id, occurred_at:new Date().toISOString()});
  setState({ view: state.user.role==='ADMIN' ? 'admin' : 'elector' });
  toast('Contraseña actualizada correctamente.');
  return false;
}

function logout(){ setState({ user:null, view:'login' }); }

function saveVoter(e, id){
  e.preventDefault();
  const f = new FormData(e.target);
  const document_ = f.get('document').trim(), full_name = f.get('full_name').trim(), grade_id = Number(f.get('grade_id'));
  const excluir = f.get('excluir_de_promocion')==='on';
  if(id){
    const v = DB.voters.find(v=>v.id===id);
    const before = {...v};
    Object.assign(v, {document:document_, full_name, grade_id, excluir_de_promocion:excluir});
    DB.auditLog.push({action:'VOTER_UPDATED', target_id:id, field_name:'multiple', old_value:JSON.stringify(before), new_value:JSON.stringify(v)});
    toast('Elector actualizado. Cambio registrado en auditoría.');
  } else {
    if(DB.voters.some(v=>v.document===document_)){ toast('Ya existe un elector con ese documento.'); return false; }
    const newId = Math.max(...DB.voters.map(v=>v.id))+1;
    DB.voters.push({ id:newId, role:'ELECTOR', document:document_, full_name, grade_id, status:'ACTIVO', requiere_cambio_clave:true, excluir_de_promocion:excluir, password:`${document_}.${DB.academicYear.year}` });
    DB.auditLog.push({action:'VOTER_CREATED', target_id:newId});
    toast('Elector registrado con clave inicial autogenerada.');
  }
  setState({ showVoterModal:false });
  return false;
}

function deleteVoter(id){
  const v = DB.voters.find(v=>v.id===id);
  v.status='ELIMINADO'; v.deleted_at = new Date().toISOString().slice(0,10);
  DB.auditLog.push({action:'VOTER_DELETED', target_id:id, field_name:'status', old_value:'ACTIVO', new_value:'ELIMINADO'});
  toast('Eliminación lógica aplicada. Los votos ya emitidos permanecen intactos (RN-7).');
  render();
}
function restoreVoter(id){
  const v = DB.voters.find(v=>v.id===id);
  v.status='ACTIVO'; v.deleted_at=null;
  DB.auditLog.push({action:'VOTER_RESTORED', target_id:id, field_name:'status', old_value:'ELIMINADO', new_value:'ACTIVO'});
  toast('Elector restaurado.');
  render();
}

function PromotionModal(){
  const activos = DB.voters.filter(v=>v.role==='ELECTOR' && v.status==='ACTIVO');
  const excluidos = activos.filter(v=>v.excluir_de_promocion);
  const promovibles = activos.filter(v=>!v.excluir_de_promocion);
  const aEgresar = promovibles.filter(v=> DB.grades.find(g=>g.id===v.grade_id).is_last_grade);
  const alreadyRun = !!DB.academicYear.promotionExecutedAt;
  return `
  <div class="fixed inset-0 bg-inverse-surface/60 flex items-center justify-center p-6 z-40 fade-in" onclick="if(event.target===this) setState({showPromotionModal:false})">

      ${alreadyRun ? `<div class="bg-status-pending/10 text-status-pending rounded-lg p-3 text-sm mb-4 flex gap-2">${icon('warning')} Ya se ejecutó la promoción este año lectivo. Continuar requiere confirmación adicional (RF-M02-03).</div>` : ''}
      <div class="grid grid-cols-3 gap-3 text-center mb-5">
        <div class="bg-surface-container-low rounded-lg p-3"><p class="text-2xl font-bold">${promovibles.length - aEgresar.length}</p><p class="text-xs text-on-surface-variant">A promover</p></div>
        <div class="bg-surface-container-low rounded-lg p-3"><p class="text-2xl font-bold">${excluidos.length}</p><p class="text-xs text-on-surface-variant">Excluidos</p></div>
        <div class="bg-surface-container-low rounded-lg p-3"><p class="text-2xl font-bold">${aEgresar.length}</p><p class="text-xs text-on-surface-variant">A egresar</p></div>
      </div>
      <p class="text-sm text-on-surface-variant mb-5">Cada elector activo no excluido avanza al siguiente grado según <span class="font-mono-id">grades.sequence_order</span>; quienes estén en el último grado pasarán a <strong>Egresado</strong>. La operación quedará en el log de auditoría (RN-8).</p>
      <div class="flex gap-3">
        <button onclick="setState({showPromotionModal:false})" class="flex-1 border border-outline-variant rounded-lg py-2.5 font-semibold text-sm">Cancelar</button>
        <button onclick="runPromotion()" class="flex-1 bg-primary text-on-primary rounded-lg py-2.5 font-semibold text-sm">Confirmar promoción</button>
      </div>
    </div>
  </div>`;
}

function runPromotion(){
  const activos = DB.voters.filter(v=>v.role==='ELECTOR' && v.status==='ACTIVO' && !v.excluir_de_promocion);
  let promovidos=0, egresados=0;
  activos.forEach(v=>{
    const g = DB.grades.find(g=>g.id===v.grade_id);
    if(g.is_last_grade){ v.status='EGRESADO'; egresados++; }
    else { const next = DB.grades.find(gg=>gg.sequence_order===g.sequence_order+1); if(next){ v.grade_id = next.id; promovidos++; } }
  });
  DB.academicYear.promotionExecutedAt = new Date().toISOString();
  DB.auditLog.push({action:'PROMOTION_RUN', details:JSON.stringify({promovidos, egresados})});
  setState({ showPromotionModal:false });
  toast(`Promoción aplicada: ${promovidos} promovidos, ${egresados} egresados.`);
}

        <h2 class="font-semibold mb-6 flex items-center gap-2">${icon('bar_chart')} Distribución de votos</h2>

            <div class="flex-1 flex flex-col items-center gap-2 h-full justify-end">
              <span class="text-xs font-semibold">${((c.votes/total)*100).toFixed(0)}%</span>

      <div class="flex flex-col gap-3">

          <div class="bg-surface-container-lowest rounded-xl border-l-4 ${['border-primary','border-secondary-fixed','border-tertiary','border-outline-variant'][i%4]} border-t border-r border-b border-border-subtle shadow-card p-4 flex justify-between items-center">

            ? `<div class="h-40 bg-surface-container flex items-center justify-center text-outline">${icon('front_hand','text-4xl')}</div>`
            : `<div class="h-40 bg-cover bg-center relative" style="background-image:url('${c.photo_url}')"><span class="absolute top-2 right-2 bg-white text-primary text-xs font-bold px-2 py-1 rounded">0${i+1}</span></div>`}
          <div class="p-4 flex flex-col flex-1">
            <p class="font-semibold">${c.name}</p>
            <p class="text-xs text-on-surface-variant mb-4">${c.slogan || 'No elegir a ningún candidato'}</p>
            <button onclick="openProposal(${c.id})" class="mt-auto w-full border border-primary text-primary rounded-lg py-2 text-sm font-semibold">${c.is_blank_vote ? 'Seleccionar' : 'Ver propuestas'}</button>
          </div>
        </div>`).join('')}
    </div>
    ${state.modalCandidate ? ProposalModal() : ''}
  </div>`;
}

function openProposal(candId){ setState({ modalCandidate: candId }); }
function closeProposal(){ setState({ modalCandidate: null }); }

function ProposalModal(){
  const c = DB.candidates.find(c=>c.id===state.modalCandidate);
  return `
  <div class="fixed inset-0 bg-primary-container/50 flex items-center justify-center p-6 z-40 fade-in">
    <div class="bg-surface-container-lowest rounded-xl shadow-card max-w-lg w-full overflow-hidden">
      <div class="flex justify-between items-center p-5 border-b border-border-subtle">
        <div><p class="text-xs uppercase text-on-surface-variant font-semibold">${c.is_blank_vote?'Opción especial':'Candidato'}</p><h3 class="text-lg font-bold">${c.name}</h3></div>
        <button onclick="closeProposal()">${icon('close')}</button>
      </div>
      <div class="p-5">
        ${c.is_blank_vote
          ? `<p class="text-sm text-on-surface-variant">No estás obligado a elegir un candidato. El voto en blanco se cuenta y se refleja en los resultados como cualquier otra opción.</p>`
          : `<p class="text-xs uppercase text-on-surface-variant font-semibold mb-2">Propuestas (RF-M04-01)</p>
             <ul class="flex flex-col gap-2">
               ${c.proposals.map(p=>`<li class="flex gap-2 text-sm"><span class="text-status-active mt-0.5">${icon('task_alt','text-base')}</span>${p}</li>`).join('')}
             </ul>`}
      </div>
      <div class="p-5 border-t border-border-subtle flex gap-3">
        <button onclick="closeProposal()" class="flex-1 border border-outline-variant rounded-lg py-2.5 font-semibold text-sm">Volver al tarjetón</button>
        <button onclick="confirmVote(${c.id})" class="flex-1 bg-secondary text-on-secondary rounded-lg py-2.5 font-semibold text-sm flex items-center justify-center gap-1">${icon('check_circle','text-base')} Confirmar voto</button>
      </div>
    </div>
  </div>`;
}

function confirmVote(candId){
  const c = DB.candidates.find(c=>c.id===candId);
  DB.participations.push({ voter_id: state.user.id, voting_event_id: c.voting_event_id });
  // el voto real se registra sin voter_id (RN-3 / diseño de 'votes'); aquí solo simulamos el conteo agregado
  DB.auditLog.push({action:'VOTE_CAST', voter_id: state.user.id, target_entity:'voting_events', target_id: c.voting_event_id});
  setState({ modalCandidate:null, electorTab:'dashboard' });
  toast('Voto registrado de forma anónima. ¡Gracias por participar!');
}

/* ============================== RENDER PRINCIPAL ============================== */
function render(){
  const app = document.getElementById('app');
  let html = '';
  if(!state.user || state.view==='login') html = LoginView();
  else if(state.view==='force-password') html = ForcePasswordView();
  else if(state.user.role==='ADMIN'){
    let inner;
    if(state.adminTab==='dashboard') inner = AdminDashboard();
    else if(state.adminTab==='census') inner = AdminCensus();
    else if(state.adminTab==='events') inner = AdminEventsView();
    else if(state.adminTab==='results') inner = ResultsView(2, true);
    html = AdminShell(inner);
  } else {
    let inner;
    if(state.electorTab==='dashboard') inner = ElectorDashboard();
    else if(state.electorTab==='vote') inner = BallotView();
    else if(state.electorTab==='results') inner = hasVoted(state.user.id, state.activeBallotEvent||2) ? ResultsView(state.activeBallotEvent||2,false) : BlockedResultsView();
    html = ElectorShell(inner);
  }
  app.innerHTML = html + `<div id="toast-slot">${toastHTML()}</div>`;
}

function AdminEventsView(){
  return `
  <div class="fade-in">
    <h1 class="text-3xl font-bold mb-1">Procesos Electorales</h1>
    <p class="text-on-surface-variant mb-6">Creación y parametrización de elecciones (RF-M03-01): título, tipo, grados habilitados y horario.</p>
    <div class="grid sm:grid-cols-2 gap-4">
      ${DB.votingEvents.map(ev=>`
        <div class="bg-surface-container-lowest rounded-xl border border-border-subtle shadow-card p-5">
          <div class="flex justify-between mb-2">${statusBadge(ev.status==='ACTIVA'?'ACTIVO':ev.status)}<span class="text-xs text-on-surface-variant">${ev.election_type}</span></div>
          <p class="font-semibold">${ev.title}</p>
          <p class="text-sm text-on-surface-variant">${ev.description}</p>
        </div>`).join('')}
    </div>
  </div>`;
}

function BlockedResultsView(){
  return `<div class="max-w-md mx-auto text-center py-20 fade-in">
    ${icon('lock','text-error text-5xl')}
    <h2 class="text-xl font-bold mt-3">Resultados bloqueados</h2>
    <p class="text-on-surface-variant mt-1">Solo puedes ver el escrutinio en tiempo real después de haber votado en esta elección (RN-4).</p>
    <button onclick="setState({electorTab:'vote'})" class="mt-5 bg-primary text-on-primary px-5 py-2.5 rounded-lg font-semibold">Ir al tarjetón</button>
  </div>`;
}

render();
</script>
</body>
</html>
